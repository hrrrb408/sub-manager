services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npx next dev -p 3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-submanager}@mysql:3306/${MYSQL_DATABASE:-sub_manager}
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
