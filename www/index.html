<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubManager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #10b981;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .splash {
      text-align: center; color: white;
    }
    .splash h1 {
      font-size: 2rem; font-weight: 700; margin-bottom: 1.5rem;
    }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline {
      display: none; margin-top: 1.5rem;
      padding: 0.75rem 1.5rem; border-radius: 8px;
      background: rgba(0,0,0,0.2); font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="splash">
    <h1>SubManager</h1>
    <div class="spinner"></div>
    <div class="offline">网络不可用，请检查连接</div>
  </div>
  <script>
    setTimeout(function() {
      if (document.querySelector('.splash').style.display !== 'none') {
        document.querySelector('.offline').style.display = 'block';
      }
    }, 5000);
  </script>
</body>
</html>
